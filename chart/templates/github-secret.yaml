{{- if .Values.github.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.github.secretName }}
  namespace: {{ include "agentex.namespace" . }}
  labels:
    {{- include "agentex.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /* base64-encode the token */}}
  {{ .Values.github.secretKey }}: {{ .Values.github.token | b64enc | quote }}
{{- end }}
