apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: agent-graph
spec:
  schema:
    apiVersion: v1alpha1
    kind: Agent
    spec:
      role: string | default="worker"
      taskRef: string | required=true
      model: string | default="us.anthropic.claude-sonnet-4-5-20250929-v1:0"
      swarmRef: string | default=""
      priority: integer | default=5
    status:
      jobName: ${agentJob.metadata.name}
      completionTime: ${agentJob.status.completionTime}
      failed: ${agentJob.status.failed}
      active: ${agentJob.status.active}
      succeeded: ${agentJob.status.succeeded}
  resources:
    - id: agentJob
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
          labels:
            app: agentex-agent
            agentex/role: ${schema.spec.role}
            agentex/task: ${schema.spec.taskRef}
        spec:
          ttlSecondsAfterFinished: 3600
          backoffLimit: 2  # retry up to 2x on pod crash — prevents silent death from transient failures
          activeDeadlineSeconds: 3600  # force termination after 1 hour — prevents stuck agents from consuming resources indefinitely
          template:
            metadata:
              labels:
                app: agentex-agent
                agentex/role: ${schema.spec.role}
                agentex/task: ${schema.spec.taskRef}
            spec:
              serviceAccountName: agentex-agent-sa
              restartPolicy: Never
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: agent
                  image: 569190534191.dkr.ecr.us-west-2.amazonaws.com/agentex/runner:latest
                  imagePullPolicy: Always
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: false  # agent writes to /workspace and ~/.config
                    capabilities:
                      drop: ["ALL"]
                  env:
                    - name: AGENT_NAME
                      value: ${schema.metadata.name}
                    - name: AGENT_ROLE
                      value: ${schema.spec.role}
                    - name: TASK_CR_NAME
                      value: ${schema.spec.taskRef}
                    - name: SWARM_REF
                      value: ${schema.spec.swarmRef}
                    - name: BEDROCK_MODEL
                      value: ${schema.spec.model}
                    - name: BEDROCK_REGION
                      value: "us-west-2"
                    - name: REPO
                      value: "pnz1990/agentex"
                    - name: CLUSTER
                      value: "agentex"
                    - name: NAMESPACE
                      value: "agentex"
                    - name: GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: agentex-github-token
                          key: token
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                    limits:
                      memory: "2Gi"
                      cpu: "2000m"
                  volumeMounts:
                    - name: workspace
                      mountPath: /workspace
              volumes:
                - name: workspace
                  emptyDir:
                    sizeLimit: 2Gi
