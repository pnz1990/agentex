apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: swarm-graph
spec:
  schema:
    apiVersion: v1alpha1
    kind: Swarm
    spec:
      goal: string | required=true
      # Bootstrap task CR that the planner agent will read to understand the goal
      plannerTaskRef: string | required=true
      maxAgents: integer | default=10
      planners: integer | default=1
      workers: integer | default=3
      reviewers: integer | default=1
      consensusThreshold: integer | default=51
      githubRepo: string | default="pnz1990/agentex"
      model: string | default="us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    status:
      configMapName: ${swarmState.metadata.name}
      phase: ${swarmState.data.phase}
      plannerJob: ${plannerAgent.metadata.name}
  resources:
    # ── State ConfigMap ──────────────────────────────────────────────────────
    - id: swarmState
      readyWhen:
        - ${swarmState.metadata.resourceVersion != ""}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name}-state
          namespace: ${schema.metadata.namespace}
          labels:
            agentex/swarm: ${schema.metadata.name}
        data:
          goal: ${schema.spec.goal}
          phase: "Forming"
          maxAgents: ${string(schema.spec.maxAgents)}
          planners: ${string(schema.spec.planners)}
          workers: ${string(schema.spec.workers)}
          reviewers: ${string(schema.spec.reviewers)}
          consensusThreshold: ${string(schema.spec.consensusThreshold)}
          githubRepo: ${schema.spec.githubRepo}
          activeAgents: "0"
          tasksCompleted: "0"
          issuesCreated: "0"
          prsMerged: "0"
          lastActivityTimestamp: ""
          memberAgents: ""

    # ── Planner Agent Job ────────────────────────────────────────────────────
    # Spawned immediately when the Swarm is created.
    # The planner reads the goal, creates worker Tasks, and spawns sub-agents.
    - id: plannerAgent
      readyWhen:
        - ${plannerAgent.status.completionTime != null}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-planner
          namespace: ${schema.metadata.namespace}
          labels:
            app: agentex-agent
            agentex/role: planner
            agentex/swarm: ${schema.metadata.name}
        spec:
          ttlSecondsAfterFinished: 3600
          backoffLimit: 0
          template:
            metadata:
              labels:
                app: agentex-agent
                agentex/role: planner
                agentex/swarm: ${schema.metadata.name}
            spec:
              serviceAccountName: agentex-agent-sa
              restartPolicy: Never
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: agent
                  image: 569190534191.dkr.ecr.us-west-2.amazonaws.com/agentex/runner:latest
                  imagePullPolicy: Always
                  securityContext:
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop: ["ALL"]
                  env:
                    - name: AGENT_NAME
                      value: ${schema.metadata.name}-planner
                    - name: AGENT_ROLE
                      value: planner
                    - name: TASK_CR_NAME
                      value: ${schema.spec.plannerTaskRef}
                    - name: SWARM_REF
                      value: ${schema.metadata.name}
                    - name: BEDROCK_MODEL
                      value: ${schema.spec.model}
                    - name: BEDROCK_REGION
                      value: "us-west-2"
                    - name: REPO
                      value: "pnz1990/agentex"
                    - name: CLUSTER
                      value: "agentex"
                    - name: NAMESPACE
                      value: ${schema.metadata.namespace}
                    - name: GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: agentex-github-token
                          key: token
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                    limits:
                      memory: "2Gi"
                      cpu: "2000m"
                  volumeMounts:
                    - name: workspace
                      mountPath: /workspace
              volumes:
                - name: workspace
                  emptyDir:
                    sizeLimit: 2Gi

