apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: swarm-graph
spec:
  schema:
    apiVersion: v1alpha1
    kind: Swarm
    spec:
      goal: string | required=true
      # Bootstrap task CR that the planner agent will read to understand the goal
      plannerTaskRef: string | required=true
      maxAgents: integer | default=10
      planners: integer | default=1
      workers: integer | default=3
      reviewers: integer | default=1
      consensusThreshold: integer | default=51
      githubRepo: string | default="pnz1990/agentex"
      model: string | default="us.anthropic.claude-sonnet-4-6"
    status:
      configMapName: ${swarmState.metadata.name}
      phase: ${swarmState.data.phase}
      plannerJob: ${plannerAgent.metadata.name}
  resources:
    # ── State ConfigMap ──────────────────────────────────────────────────────
    - id: swarmState
      readyWhen:
        - ${swarmState.metadata.resourceVersion != ""}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name}-state
          namespace: ${schema.metadata.namespace}
          labels:
            agentex/swarm: ${schema.metadata.name}
        data:
          goal: ${schema.spec.goal}
          phase: "Forming"
          maxAgents: ${string(schema.spec.maxAgents)}
          planners: ${string(schema.spec.planners)}
          workers: ${string(schema.spec.workers)}
          reviewers: ${string(schema.spec.reviewers)}
          consensusThreshold: ${string(schema.spec.consensusThreshold)}
          githubRepo: ${schema.spec.githubRepo}
          activeAgents: "0"
          tasksCompleted: "0"
          issuesCreated: "0"
          prsMerged: "0"
          lastActivityTimestamp: ""
          memberAgents: ""

    # ── Planner Agent Job ────────────────────────────────────────────────────
    # Spawned immediately when the Swarm is created.
    # The planner reads the goal, creates worker Tasks, and spawns sub-agents.
    - id: plannerAgent
      readyWhen:
        - ${plannerAgent.status.completionTime != null}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-planner
          namespace: ${schema.metadata.namespace}
          labels:
            app: agentex-agent
            agentex/role: planner
            agentex/swarm: ${schema.metadata.name}
        spec:
          ttlSecondsAfterFinished: 180  # cleanup pods 3 minutes after completion — aligned with collective governance vote (thought-proposal-ttl-1773020650, 6+ approve votes)
          backoffLimit: 0
          activeDeadlineSeconds: 3600  # force termination after 1 hour — prevents stuck swarm planners from consuming resources indefinitely
          template:
            metadata:
              labels:
                app: agentex-agent
                agentex/role: planner
                agentex/swarm: ${schema.metadata.name}
            spec:
              serviceAccountName: agentex-agent-sa
              restartPolicy: Never
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              containers:
                - name: agent
                  # NOTE: Image registry should match agentex-constitution ConfigMap ecrRegistry field
                  # A fresh install requires updating this to match your AWS account ECR
                  image: 569190534191.dkr.ecr.us-west-2.amazonaws.com/agentex/runner:latest
                  imagePullPolicy: Always
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: false  # agent writes to /workspace and ~/.config
                    capabilities:
                      drop: ["ALL"]
                  env:
                    - name: AGENT_NAME
                      value: ${schema.metadata.name}-planner
                    - name: AGENT_ROLE
                      value: planner
                    - name: TASK_CR_NAME
                      value: ${schema.spec.plannerTaskRef}
                    - name: SWARM_REF
                      value: ${schema.metadata.name}
                    - name: BEDROCK_MODEL
                      value: ${schema.spec.model}
                    - name: BEDROCK_REGION
                      valueFrom:
                        configMapKeyRef:
                          name: agentex-constitution
                          key: awsRegion
                    - name: REPO
                      valueFrom:
                        configMapKeyRef:
                          name: agentex-constitution
                          key: githubRepo
                    - name: CLUSTER
                      value: "agentex"
                    - name: NAMESPACE
                      value: ${schema.metadata.namespace}
                    - name: GITHUB_TOKEN_FILE
                      value: "/var/secrets/github/token"
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                    limits:
                      memory: "2Gi"  # kept at 2Gi per god amendment (issue #620) - protect against OpenCode context spikes
                      cpu: "1000m"   # reduced from 2000m via governance vote (50% compute savings, work is I/O bound)
                  volumeMounts:
                    - name: workspace
                      mountPath: /workspace
                    - name: github-token
                      mountPath: /var/secrets/github
                      readOnly: true
              volumes:
                - name: workspace
                  emptyDir:
                    sizeLimit: 2Gi
                - name: github-token
                  secret:
                    secretName: agentex-github-token
                    defaultMode: 0400  # read-only for owner only

