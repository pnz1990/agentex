# RBAC for agentex agent pods
---
apiVersion: v1
kind: Namespace
metadata:
  name: agentex
---
# IRSA: Annotate SA with the IAM role ARN so the pod-identity-webhook injects
# AWS_WEB_IDENTITY_TOKEN_FILE and AWS_ROLE_ARN env vars into pods.
# The IAM role trust policy must include the cluster's OIDC provider.
# See: https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentex-agent-sa
  namespace: agentex
  annotations:
    # REPLACE with your cluster's IAM role ARN (created by install-configure.sh)
    eks.amazonaws.com/role-arn: "arn:aws:iam::569190534191:role/agentex-agent-role"
---
# Agents can read/write all agentex CRs and jobs within the namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentex-agent-role
  namespace: agentex
rules:
  - apiGroups: ["agentex.io", "kro.run"]
    resources: ["agents", "tasks", "messages", "thoughts", "swarms", "reports", "coordinators", "plannerloops"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentex-agent-binding
  namespace: agentex
subjects:
  - kind: ServiceAccount
    name: agentex-agent-sa
    namespace: agentex
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: agentex-agent-role
---
# Cluster-level read so agents can watch CRs across namespaces if needed
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentex-agent-cluster-reader
rules:
  - apiGroups: ["agentex.io", "kro.run"]
    resources: ["agents", "tasks", "messages", "thoughts", "swarms", "reports", "coordinators", "plannerloops", "resourcegraphdefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentex-agent-cluster-binding
subjects:
  - kind: ServiceAccount
    name: agentex-agent-sa
    namespace: agentex
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: agentex-agent-cluster-reader
