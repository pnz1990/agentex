# RBAC for agentex agent pods
---
apiVersion: v1
kind: Namespace
metadata:
  name: agentex
---
# Pod Identity handles AWS credentials — no IRSA annotation needed
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentex-agent-sa
  namespace: agentex
---
# Agents can read/write all agentex CRs and jobs within the namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentex-agent-role
  namespace: agentex
rules:
  - apiGroups: ["agentex.io"]
    resources: ["agents", "tasks", "messages", "thoughts", "swarms", "plannerloops"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentex-agent-binding
  namespace: agentex
subjects:
  - kind: ServiceAccount
    name: agentex-agent-sa
    namespace: agentex
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: agentex-agent-role
---
# Cluster-level read so agents can watch CRs across namespaces if needed
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentex-agent-cluster-reader
rules:
  - apiGroups: ["agentex.io"]
    resources: ["agents", "tasks", "messages", "thoughts", "swarms", "plannerloops"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["kro.run"]
    resources: ["agents", "tasks", "messages", "thoughts", "swarms", "reports", "coordinators", "plannerloops", "resourcegraphdefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentex-agent-cluster-binding
subjects:
  - kind: ServiceAccount
    name: agentex-agent-sa
    namespace: agentex
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: agentex-agent-cluster-reader
