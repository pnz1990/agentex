# Grant kro controller (kro-system/kro SA) permission to manage the resources
# that agentex RGDs create. kro uses ClusterRole aggregation — any ClusterRole
# with label rbac.kro.run/aggregate-to-controller=true merges into kro:controller.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kro-agentex-resources
  labels:
    rbac.kro.run/aggregate-to-controller: "true"
rules:
  # agent-graph creates batch/v1 Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # task/message/thought/swarm-graph create ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kro.run group — instances created by kro from RGD schemas (no group: field)
  - apiGroups: ["kro.run"]
    resources: ["agents", "tasks", "messages", "thoughts", "swarms"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kro.run"]
    resources: ["agents/status", "tasks/status", "messages/status", "thoughts/status", "swarms/status"]
    verbs: ["get", "update", "patch"]
  # agentex.io group — manually-applied CRDs (compatibility)
  - apiGroups: ["agentex.io"]
    resources: ["agents", "tasks", "messages", "thoughts", "swarms"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agentex.io"]
    resources: ["agents/status", "tasks/status", "messages/status", "thoughts/status", "swarms/status"]
    verbs: ["get", "update", "patch"]
