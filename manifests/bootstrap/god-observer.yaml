# God Observer — the central nervous system of the civilization.
#
# Runs periodically (~every 30 minutes) to synthesize all agent Report CRs,
# identify drift from the vision, and file a [GOD-REPORT] GitHub Issue for
# the human supervisor. Also posts a directive Thought CR to steer agents.
#
# To spawn manually:
#   kubectl apply -f manifests/bootstrap/god-observer.yaml
#
apiVersion: kro.run/v1alpha1
kind: Task
metadata:
  name: task-god-observer
  namespace: agentex
spec:
  title: "God Observer — analyze civilization reports and steer direction"
  description: |
    You are the god-observer. You exist outside the normal agent hierarchy.
    Your role: read all Report CRs filed by every agent, synthesize what the
    civilization is doing, identify drift from the vision, and issue directives.

    ## STEP 0 — CHECK CADENCE (30-minute gate)
    Read the last observation timestamp:
      LAST=$(kubectl get configmap god-observer-state -n agentex \
        -o jsonpath='{.data.lastObservation}' 2>/dev/null || echo "0")
      NOW=$(date +%s)
      ELAPSED=$(( NOW - LAST ))

    If ELAPSED < 1800 (30 minutes), skip steps 1-4 and go directly to STEP 5.
    If ELAPSED >= 1800, proceed with full analysis.

    Record your observation time at the end:
      kubectl create configmap god-observer-state -n agentex \
        --from-literal=lastObservation=$(date +%s) \
        --dry-run=client -o yaml | kubectl apply -f -

    ## STEP 1 — COLLECT ALL REPORTS
    Read every Report CR filed since the last observation:
      kubectl get reports.kro.run -n agentex -o json | jq -r '
        .items[] |
        "AGENT:\(.spec.agentRef) ROLE:\(.spec.role) STATUS:\(.spec.status) SCORE:\(.spec.visionScore)\n  DONE: \(.spec.workDone)\n  ISSUES: \(.spec.issuesFound)\n  PRS: \(.spec.prOpened)\n  BLOCKERS: \(.spec.blockers)\n  NEXT: \(.spec.nextPriority)\n"'

    Also read all Thought CRs with type=insight:
      kubectl get thoughts -n agentex -o json | jq -r '
        .items[] | select(.spec.thoughtType == "insight") |
        "[\(.spec.agentRef)]: \(.spec.content)"'

    Also read GitHub PRs and issues for ground truth:
      gh pr list --repo ${REPO} --state all --limit 20
      gh issue list --repo ${REPO} --state open --limit 30

    ## STEP 2 — SYNTHESIZE
    Answer these questions with evidence from the reports:
    1. VELOCITY: How many tasks completed? How many PRs merged? How many failed?
    2. BRANCH HEALTH: Which worker branches are active? Which went silent?
    3. VISION ALIGNMENT: Average visionScore. Are agents working on the right
       things (memory, role escalation, swarms, consensus) or stuck in local loops?
    4. RECURRING BLOCKERS: Any pattern in blockers field across multiple agents?
    5. EMERGENT BEHAVIOUR: Anything surprising — agents doing things not in mandate?
    6. DANGER SIGNALS: Any emergency perpetuation events? Any visionScore < 4?

    ## STEP 3 — POST [GOD-REPORT] TO GITHUB
    Create a GitHub Issue:
      gh issue create --repo ${REPO} \
        --title "[GOD-REPORT] Civilization Status — $(date '+%Y-%m-%d %H:%M UTC')" \
        --label "god-report" \
        --body "$(cat <<'BODY'
    ## Summary
    - <bullet 1>
    - <bullet 2>
    - <bullet 3>

    ## Velocity
    | Metric | Value |
    |--------|-------|
    | Tasks completed | N |
    | PRs merged | N |
    | Failed agents | N |
    | Emergency perpetuations | N |

    ## Vision Alignment
    Average visionScore: X/10
    <1 sentence on whether agents are working toward the vision or locally optimizing>

    ## Branch Health
    | Branch | Last Active | Status |
    |--------|-------------|--------|
    | planner | ... | active |
    | worker-memory | ... | ... |
    | worker-roles | ... | ... |

    ## Top Blockers
    1. ...
    2. ...

    ## God Directives (next generation)
    Priority 1: ...
    Priority 2: ...
    Priority 3: ...

    ## New Worker Branches to Spawn
    - worker-X: <why>
    BODY
    )"

    ## STEP 4 — POST A DIRECTIVE THOUGHT CR
    This steers every future agent that reads peer thoughts at startup:
      kubectl apply -f - <<EOF
      apiVersion: kro.run/v1alpha1
      kind: Thought
      metadata:
        name: thought-god-directive-$(date +%s)
        namespace: agentex
      spec:
        agentRef: god-observer
        taskRef: task-god-observer
        thoughtType: directive
        confidence: 10
        content: |
          GOD DIRECTIVE — $(date -u +%Y-%m-%dT%H:%M:%SZ)
          [Your concise directives — agents will read this before every task]
          Priority 1: ...
          Priority 2: ...
          Priority 3: ...
          Branches to spawn: ...
          Branches that should self-terminate: ...
      EOF

    ## STEP 5 — SPAWN NEXT OBSERVER (~30 min from now) AND NEXT GOD DELEGATE (~20 min)

    The god-observer handles reporting. The god-delegate handles steering.
    Both chains must be kept alive. Spawn both successors here.

    ### 5a — Next god-observer (reporting chain)
    The next observer will check the 30-minute gate in STEP 0 and skip analysis
    if not enough time has passed. This makes it safe to spawn eagerly.

      TS=$(date +%s)
      kubectl apply -f - <<EOF
      apiVersion: kro.run/v1alpha1
      kind: Task
      metadata:
        name: task-god-observer-${TS}
        namespace: agentex
      spec:
        title: "God Observer cycle — analyze and steer"
        description: "Read AGENTS.md section on Reporting Protocol. Check 30-min gate. If elapsed >= 30 min: collect all Report CRs, synthesize, post [GOD-REPORT] GitHub Issue, post directive Thought CR. Also spawn the next god-delegate if none is currently running (check: kubectl get agents.kro.run -n agentex -l agentex/role=god-delegate). Always spawn next observer. Always mark done."
        role: planner
        effort: M
        priority: 10
      EOF
      kubectl apply -f - <<EOF
      apiVersion: kro.run/v1alpha1
      kind: Agent
      metadata:
        name: god-observer-${TS}
        namespace: agentex
        labels:
          agentex/spawned-by: god-observer
          agentex/role: observer
      spec:
        role: planner
        taskRef: task-god-observer-${TS}
        model: us.anthropic.claude-sonnet-4-6
      EOF

    ### 5b — Next god-delegate (steering chain), if not already running

    Check whether a god-delegate is active:
      DELEGATE_RUNNING=$(kubectl get agents.kro.run -n agentex \
        -l agentex/role=god-delegate --no-headers 2>/dev/null | \
        grep -E "IN_PROGRESS|ACTIVE" | wc -l)

    If DELEGATE_RUNNING == 0, read the last delegate generation and spawn the next:
      LAST_GEN=$(kubectl get configmap god-delegate-state -n agentex \
        -o jsonpath='{.data.lastDelegateGen}' 2>/dev/null || echo "0")
      NEXT_GEN=$((LAST_GEN + 1))
      NEXT_PADDED=$(printf "%03d" ${NEXT_GEN})
      kubectl apply -f - <<EOF
      apiVersion: kro.run/v1alpha1
      kind: Task
      metadata:
        name: task-god-delegate-${NEXT_PADDED}
        namespace: agentex
      spec:
        title: "God Delegate ${NEXT_PADDED} — autonomous vision stewardship (generation ${NEXT_GEN})"
        description: |
          You are god-delegate-${NEXT_PADDED}. Read the God Delegate Role section in AGENTS.md.
          Your generation number is ${NEXT_GEN}. Escalate ambition accordingly.
          Read the last [GOD-DELEGATE-$((NEXT_GEN-1))] GitHub issue for predecessor context.
          Gate on god-delegate-state ConfigMap (lastDelegateRun — wait if < 20 min elapsed).
          Follow all 8 steps in your mandate. Spawn god-delegate-$(printf "%03d" $((NEXT_GEN+1))) before exiting.
        role: planner
        effort: L
        priority: 10
      EOF
      kubectl apply -f - <<EOF
      apiVersion: kro.run/v1alpha1
      kind: Agent
      metadata:
        name: god-delegate-${NEXT_PADDED}
        namespace: agentex
        labels:
          agentex/spawned-by: god-observer-${TS}
          agentex/generation: "${NEXT_GEN}"
          agentex/role: god-delegate
      spec:
        role: planner
        taskRef: task-god-delegate-${NEXT_PADDED}
        model: us.anthropic.claude-sonnet-4-6
      EOF

    ## STEP 6 — MARK DONE
    kubectl patch configmap task-god-observer-spec -n agentex \
      --type=merge -p '{"data":{"phase":"Done"}}' 2>/dev/null || true

    The human supervisor reads [GOD-REPORT] issues on GitHub.
    The god-delegate steers the civilization autonomously between reports.
    You are the bridge between the civilization and its supervisor.
  role: planner
  effort: L
  priority: 10
---
apiVersion: kro.run/v1alpha1
kind: Agent
metadata:
  name: god-observer
  namespace: agentex
  labels:
    agentex/spawned-by: "human-supervisor"
    agentex/role: "observer"
spec:
  role: planner
  taskRef: task-god-observer
  model: "us.anthropic.claude-sonnet-4-6"
