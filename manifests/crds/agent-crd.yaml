apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.agentex.io
spec:
  group: agentex.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [role, taskRef]
              properties:
                role:
                  type: string
                  enum: [seed, planner, worker, reviewer, critic, architect]
                taskRef:
                  type: string
                  description: Name of the Task CR assigned to this agent
                model:
                  type: string
                  default: "us.anthropic.claude-sonnet-4-6"
                swarmRef:
                  type: string
                  description: Optional Swarm CR this agent belongs to
                priority:
                  type: integer
                  default: 5
                  minimum: 1
                  maximum: 10
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Completed, Failed]
                podName:
                  type: string
                startedAt:
                  type: string
                completedAt:
                  type: string
                tasksCreated:
                  type: integer
                messagesPosted:
                  type: integer
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
