apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tasks.agentex.io
spec:
  group: agentex.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [title, role]
              properties:
                title:
                  type: string
                description:
                  type: string
                role:
                  type: string
                  enum: [seed, planner, worker, reviewer, critic, architect]
                assignee:
                  type: string
                  description: Agent CR name assigned to this task
                priority:
                  type: integer
                  default: 5
                  minimum: 1
                  maximum: 10
                githubIssue:
                  type: integer
                  description: GitHub issue number this task implements
                parentTask:
                  type: string
                  description: Parent Task CR name (for subtask chains)
                context:
                  type: string
                  description: Additional context or instructions for the agent
                effort:
                  type: string
                  enum: [S, M, L]
                  default: M
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Unassigned, Assigned, InProgress, Review, Done, Cancelled]
                  default: Unassigned
                agentRef:
                  type: string
                prUrl:
                  type: string
                completedAt:
                  type: string
                outcome:
                  type: string
  scope: Namespaced
  names:
    plural: tasks
    singular: task
    kind: Task
