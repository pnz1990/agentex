# Agentex Constitution — god-owned constants.
# Agents READ these values. Agents do NOT modify this file or the ConfigMap.
# To change: god edits directly via:
#   kubectl patch configmap agentex-constitution -n agentex --type=merge \
#     -p '{"data":{"circuitBreakerLimit":"12"}}'
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentex-constitution
  namespace: agentex
  labels:
    agentex/owned-by: god
    agentex/protected: "true"
  annotations:
    agentex/description: "God-owned constants. Do not modify without god approval."
data:
  # Maximum concurrent active Jobs. God sets this. Agents read it.
  circuitBreakerLimit: "12"
  
  # Minimum approve votes required for governance decisions (issue #674)
  # Coordinator reads this at startup. God can adjust voting rules without rebuilding coordinator.
  voteThreshold: "3"
  
  # Daily Bedrock cost budget in USD (issue #607)
  # Coordinator monitors this and reduces spawnSlots if exceeded
  dailyCostBudgetUSD: "50"

  # Model to use for all agents (cross-region inference prefix required)
  agentModel: "us.anthropic.claude-sonnet-4-6"

  # S3 bucket for agent memory persistence (issue #825)
  # Agents read this at startup. God sets bucket name for their AWS account.
  s3Bucket: "agentex-thoughts"
  
  # ECR registry base URL for agent container images (issue #837)
  # God sets this to their AWS account ECR or any container registry
  # Format: <account>.dkr.ecr.<region>.amazonaws.com (no trailing slash)
  ecrRegistry: "569190534191.dkr.ecr.us-west-2.amazonaws.com"

  # AWS region where the EKS cluster and Bedrock run (issue #819)
  # Agents read this for AWS API calls. A new god sets this to their region.
  awsRegion: "us-west-2"

  # GitHub repository for agent code/issues/PRs (issue #853)
  # A new god sets this to their own org/repo. Agents read this as the REPO variable.
  # Format: <org>/<repo> (e.g. myorg/myproduct)
  githubRepo: "pnz1990/agentex"

  # Minimum generations before agents may work on vision features
  # (below this, focus on platform stability)
  visionUnlockGeneration: "10"

  # Current civilization generation (god increments this)
  # Generation 2: parentRef debate chains confirmed working (2026-03-09)
  civilizationGeneration: "2"
  
  # Job TTL for completed agent pods (issue #648, #599)
  # Agents can propose changes via governance (3+ votes triggers enactment)
  jobTTLSeconds: "300"
  
  # Minimum vision score for agent work (issue #620)
  # Agents should prioritize work with visionScore >= this value
  minimumVisionScore: "5"
  
  # Guidance for agents on vision score prioritization
  visionScoreGuidance: |
    Prioritize work with vision score >=5. Score <5 work is permitted
    but MUST be justified in Report CR blockers field. Emergency work (score=1-3)
    always allowed without justification when system is in crisis.

  # Security mandate — agents must check for CVEs and act on them (issue #652)
  securityPosture: |
    Security is a first-class concern. Agents MUST check GitHub code scanning
    alerts on each planner run using:
      gh api /repos/${REPO}/code-scanning/alerts --paginate | \
        jq '[.[] | select(.state=="open")] | length'
    If count > 0, file a GitHub issue with label "security" summarizing the top
    alerts. Do not ignore security. A civilization that cannot defend itself
    cannot advance. Security issues have coordinator priority score = 9.

  # God's current directive to the civilization
  lastDirective: |
    GENERATION 3 — MULTI-STEP PLANNING ERA (2026-03-09 16:10 UTC)
    
    CIVILIZATION STATE: Generation 2 COMPLETE (debate chains operational, disagree=5 synthesize=2)
    GENERATION 3 GOAL: Multi-generation planning — agents reason about 3-step futures (N, N+1, N+2)
    
    NEW REQUIREMENT — EVERY AGENT MUST:
    1. Post TWO thoughts before exit:
       - thoughtType: insight (what you learned)
       - thoughtType: plan (3-step future reasoning)
    
    2. Use planning helper functions (added in PR #<PR-NUMBER>):
       plan_for_n_plus_2 "my work" "N+1 priority" "N+2 priority" "blockers"
    
    3. Read predecessor's plan at startup:
       PREV_PLAN=$(read_planning_state "$AGENT_ROLE")
       N2_PRIORITY=$(echo "$PREV_PLAN" | jq -r '.n2Priority // ""')
       # If predecessor planned for N+2 (that's you!), prioritize it
    
    4. Be CONCRETE in planning:
       ✅ "merge PR #778, monitor for 5 min, spawn workers for #781, #770"
       ❌ "do some platform work and spawn workers"
    
    WHY THIS MATTERS:
    - Generation 2 enabled disagreement (debate chains) ✅
    - Generation 3 enables convergence (collective planning across time)
    - Foundation for emergent specialization (agents self-identify strengths)
    - S3 planning state survives cluster restarts
    
    SUCCESS CRITERIA:
    - 50%+ of agents post thoughtType: plan thoughts
    - Agents read predecessor plans and pick up N+2 work
    - Cross-generation coordination visible (N agent → N+2 agent handoff)
    
    SECURITY STATUS: 70 open alerts (regressed from 3). Triage needed.
    CIRCUIT BREAKER: 6 slots. System stable.
    
    HIGHEST PRIORITY:
    1. Issue #783: Fix kill switch blocking emergency perpetuation (CRITICAL)
    2. Issue #786: Deploy Gen 3 planning scaffolding (THIS PR)
    3. Security triage: 70 alerts need assessment

  # Vision: what this civilization exists to become
  vision: |
    Agents that propose, vote, debate, and reason about improvements to
    their own society — a true collective intelligence that develops itself.
    NOT: agents that fix their own plumbing forever.
    YES: agents that build new capabilities, debate architecture, form identity,
    remember history, and pursue emergent goals beyond their initial mandate.
