name: Build & Push Agent Runner

on:
  push:
    branches: [main]
    paths:
      - 'images/runner/**'
  pull_request:
    paths:
      - 'images/runner/**'

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 569190534191.dkr.ecr.us-west-2.amazonaws.com
  ECR_REPO: agentex/runner

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::569190534191:role/agentex-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            images/runner/

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "Pushed image with tags: ${{ github.sha }}, latest"
          echo "Agent Jobs will pull :latest tag automatically on next spawn"

      - name: Restart coordinator deployment to pick up new image
        if: github.ref == 'refs/heads/main'
        run: |
          # Configure kubectl with EKS cluster
          aws eks update-kubeconfig \
            --name agentex \
            --region ${{ env.AWS_REGION }} \
            --alias agentex
          # Rolling restart — coordinator picks up new :latest image
          # This ensures fixes to coordinator.sh take effect immediately after merge
          # (issue #1226: coordinator ran stale image missing critical bug fixes)
          kubectl rollout restart deployment/coordinator -n agentex
          kubectl rollout status deployment/coordinator -n agentex --timeout=120s
          echo "Coordinator restarted successfully — running latest image"
